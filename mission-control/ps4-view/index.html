<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PS4 Home Sim</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="ps4.20260221.css" />
  </head>
  <body>
    <div class="bg"></div>
    <header class="topbar">
      <div>
        <h1>PS4 Home Simulation</h1>
        <p id="counts">Loading...</p>
      </div>
      <aside id="inspector" aria-hidden="true">
        <h2 id="iTitle">Game</h2>
        <button id="closeInspector" class="inspector-close" aria-label="Close inspector" title="Close">×</button>
        <div id="iMeta"></div>
      </aside>
      <div class="actions">
        <div class="actions-row">
          <button id="refreshBtn" aria-live="polite">
            <span class="btn-label">Refresh</span>
            <span class="btn-spinner" aria-hidden="true"></span>
          </button>
          <button id="exportCategoriesBtn">Export CSV</button>
          <a href="/mission-control/">Mission Control</a>
        </div>
        <p id="freshness" class="freshness">Data freshness: --</p>
      </div>
    </header>

    <main id="rows"></main>

    <script src="ps4.20260221.js"></script>
  </body>
</html>
